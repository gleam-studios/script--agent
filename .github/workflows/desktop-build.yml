name: Desktop (Electron)

# 让官方 JS Actions（checkout/setup-node/upload 等）在 Node 24 上运行，消除 Node 20 弃用告警。
# 参见: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "web/**"
      - "agent/**"
      - "knowledge/**"
      - "skills/**"
      - "desktop/**"
      - ".github/workflows/desktop-build.yml"

# 说明：paths 对「分支 push」生效；打 tag 时 GitHub 不会按 paths 过滤，保证发版必跑构建。

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            desktop/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build & pack (electron-builder)
        working-directory: desktop
        run: npm run dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: script-agent-desktop-${{ matrix.os }}
          path: desktop/release
          if-no-files-found: warn

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all desktop artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          pattern: script-agent-desktop-*
          merge-multiple: true

      - name: Create Release and upload installers
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          body: |
            ### 首次打开（必读）

            **macOS（`.dmg`）**：打开安装盘窗口，按 **`安装说明.txt`** 三步操作（拖入应用程序 → 首次打开应用 → 运行 **`首次打开-解除隔离.command`**）。脚本与说明文件均在盘中。

            **macOS（`*-mac.zip`）**：解压后双击 **`首次打开-解除隔离.command`**（与 `.app` 同目录）。若脚本无法运行，按住 Control 点脚本 → **打开**。

            若提示「已损坏」或仅使用 `.dmg`/已拖入「应用程序」，可在终端执行（路径按实际修改）：

            ```bash
            xattr -cr "/Applications/Script Agent.app"
            open "/Applications/Script Agent.app"
            ```

            更完整说明见 [`desktop/README.md`](https://github.com/gleam-studios/script--agent/blob/main/desktop/README.md)。

            **Windows**：若出现 SmartScreen，点 **更多信息** → **仍要运行**。
          files: |
            release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
